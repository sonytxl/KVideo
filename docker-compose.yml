services:
  kvideo:
    container_name: kvideo
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: kvideo:latest
    init: true
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
